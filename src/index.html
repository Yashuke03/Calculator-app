<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator App</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

  <main>
    <section class="calculator" aria-label="Calculator">

      <!-- Display -->
      <div class="calculator__display">
        <p id="expression" class="calculator__expression"></p>
        <p id="result" class="calculator__result">0</p>
      </div>

      <!-- Buttons -->
      <div class="calculator__keys">

        <!-- Row 1 -->
        <button class="key key--action" data-action="clear">AC</button>
        <button class="key key--action" data-action="sign">+/−</button>
        <button class="key key--action" data-action="percent">%</button>
        <button class="key key--operator" data-operator="÷">÷</button>

        <!-- Row 2 -->
        <button class="key key--number" data-number="7">7</button>
        <button class="key key--number" data-number="8">8</button>
        <button class="key key--number" data-number="9">9</button>
        <button class="key key--operator" data-operator="×">×</button>

        <!-- Row 3 -->
        <button class="key key--number" data-number="4">4</button>
        <button class="key key--number" data-number="5">5</button>
        <button class="key key--number" data-number="6">6</button>
        <button class="key key--operator" data-operator="−">−</button>

        <!-- Row 4 -->
        <button class="key key--number" data-number="1">1</button>
        <button class="key key--number" data-number="2">2</button>
        <button class="key key--number" data-number="3">3</button>
        <button class="key key--operator" data-operator="+">+</button>

        <!-- Row 5 -->
        <button class="key key--number key--zero" data-number="0">0</button>
        <button class="key key--number" data-number=".">.</button>
        <button class="key key--equals" data-action="equals">=</button>

      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
